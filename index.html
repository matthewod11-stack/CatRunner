
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beach Kitty</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* GPU-accelerated game animations - moved from inline styles for performance */
    .game-obstacle {
      will-change: transform;
      contain: layout style paint;
    }

    @keyframes crabSway {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(3px); }
    }

    @keyframes coinFloat {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-6px) rotate(5deg); }
    }

    @keyframes wingFlap {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-2px) rotate(-5deg); }
    }

    @keyframes wingFlapFast {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-4px) rotate(-8deg); }
    }

    @keyframes flagWave {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      25% { transform: translateX(1px) rotate(2deg); }
      50% { transform: translateX(0) rotate(0deg); }
      75% { transform: translateX(-1px) rotate(-2deg); }
    }

    @keyframes ripple {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.15); opacity: 0.3; }
    }

    @keyframes ripple2 {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.2); opacity: 0.1; }
    }

    @keyframes bubble {
      0%, 100% { transform: translateY(0); opacity: 0.5; }
      50% { transform: translateY(-3px); opacity: 0.8; }
    }

    @keyframes poopSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes trailPulse {
      0% { opacity: 0.6; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.5); }
    }

    @keyframes palmSway {
      0%, 100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }

    /* Animation classes */
    .anim-crab-sway { animation: crabSway 2s ease-in-out infinite; }
    .anim-coin-float { animation: coinFloat 0.8s ease-in-out infinite; }
    .anim-wing-flap { animation: wingFlap 0.4s ease-in-out infinite; transform-origin: 45px 58px; }
    .anim-wing-flap-fast { animation: wingFlapFast 0.2s ease-in-out infinite; transform-origin: 40px 62px; }
    .anim-flag-wave { animation: flagWave 2s ease-in-out infinite; }
    .anim-ripple { animation: ripple 2s ease-in-out infinite; }
    .anim-ripple2 { animation: ripple2 2.5s ease-in-out infinite; }
    .anim-bubble { animation: bubble 3s ease-in-out infinite; }
    .anim-poop-spin { animation: poopSpin 0.5s linear infinite; }
    .anim-trail-pulse { animation: trailPulse 0.3s ease-out infinite; }
    .anim-palm-sway { animation: palmSway 4s ease-in-out infinite; transform-origin: 50px 110px; }
  </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>
<body class="bg-blue-50 overflow-hidden select-none">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
